<header class="bg-brand text-white h-14 px-5 flex items-center justify-between shrink-0 shadow-lg z-20">

  <!-- Brand -->
  <div class="flex items-center gap-3">
    <div class="w-7 h-7 rounded-lg bg-brand-accent flex items-center justify-center shrink-0">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="white"/>
        <rect x="8" y="1" width="5" height="2" rx=".5" fill="white"/>
        <rect x="8" y="5" width="5" height="1" rx=".5" fill="white" opacity=".6"/>
        <rect x="1" y="8" width="12" height="1.5" rx=".75" fill="white" opacity=".7"/>
        <rect x="1" y="11" width="8" height="1.5" rx=".75" fill="white" opacity=".5"/>
      </svg>
    </div>
    <span class="font-display text-lg font-light tracking-tight">FormCraft</span>
    @if (count() > 0) {
      <span class="fc-badge bg-white/10 text-white/70">{{ count() }} field{{ count() !== 1 ? 's' : '' }}</span>
    }
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-2">
    <button (click)="clear()"
      class="text-xs px-3 py-1.5 rounded-lg border border-white/20 text-white/60 hover:bg-white/10 transition-colors">
      Clear
    </button>
    <button (click)="previewOpen.emit()"
      class="text-xs px-4 py-1.5 rounded-lg bg-brand-accent hover:bg-brand-accent-h transition-colors font-medium flex items-center gap-1.5">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4z" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="6" cy="6" r="1.5" fill="currentColor"/>
      </svg>
      Preview & Submit
    </button>
  </div>
</header>
