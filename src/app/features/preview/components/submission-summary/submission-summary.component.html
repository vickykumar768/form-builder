@if (submission) {
  <div class="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden">

    <!-- Header row -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-white">
      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Submitted Data</p>
      <span class="text-[11px] text-slate-400 font-mono">{{ timestamp }}</span>
    </div>

    <!-- Data rows -->
    <div class="divide-y divide-slate-100">
      @for (entry of entries; track entry.key) {
        <div class="flex items-start justify-between gap-4 px-4 py-2.5">
          <span class="text-xs text-slate-500 shrink-0 pt-0.5 max-w-[45%] truncate">{{ entry.key }}</span>
          <span class="text-xs font-medium text-slate-800 text-right font-mono break-all">{{ entry.value }}</span>
        </div>
      }
    </div>

  </div>
}
